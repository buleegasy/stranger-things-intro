<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stranger Things Intro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.cdnfonts.com/css/itc-benguiat-w01" rel="stylesheet">
</head>
<body>
    <div class="title-container">
        <div class="stranger-things-logo">
            <div class="word-stranger">
                <span class="letter-s">S</span>
                <span class="word-middle">
                    <span>T</span>
                    <span>R</span>
                    <span>A</span>
                    <span>N</span>
                    <span>G</span>
                    <span>E</span>
                </span>
                <span class="letter-r">R</span>
            </div>
            
            <div class="top-bar-container">
                <div class="top-bar"></div>
            </div>
            
            <div class="bottom-group">
                <div class="side-bar side-bar-left"></div>
                <div class="word-things">
                    <span>T</span>
                    <span>H</span>
                    <span>I</span>
                    <span>N</span>
                    <span>G</span>
                    <span>S</span>
                </div>
                <div class="side-bar side-bar-right"></div>
            </div>
        </div>
    </div>
</body>
</html>
